<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Library</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #0a0e27;
            color: white;
            font-family: Arial, sans-serif;
        }
        header {
            background: linear-gradient(to right, #1a1f3a, #0a0e27);
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
            padding: 20px;
        }
        .sidebar {
            background-color: #1a1f3a;
            padding: 10px;
        }
        .main {
            background-color: #1a1f3a;
            padding: 10px;
            border-radius: 5px;
        }
        .video {
            width: 100%;
            border: none;
        }
        .search {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Content Library</h1>
    </header>
    <div class="container">
        <aside class="sidebar">
            <h2>Sections</h2>
            <ul>
                <li><a href="#videos">Videos</a></li>
                <li><a href="#pdfs">PDFs</a></li>
            </ul>
            <div class="search">
                <input type="text" placeholder="Search..." onkeyup="filterContent()">
            </div>
        </aside>
        <main class="main">
            <div id="videos">
                <h2>Videos</h2>
                <!-- Video content here -->
                <video class="video-js" id="videoPlayer" controls preload="auto" width="600" height="300">
                    <source src="video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div id="pdfs">
                <h2>PDFs</h2>
                <!-- PDF content here -->
                <a href="document.pdf" target="_blank">Download PDF</a>
            </div>
        </main>
    </div>
    <script src="https://vjs.zencdn.net/7.11.4/video.min.js"></script>
    <script>
        function filterContent() {
            const input = document.querySelector('.search input');
            const filter = input.value.toLowerCase();
            const videos = document.querySelectorAll('#videos h2, #pdfs h2');
            videos.forEach(video => {
                const txtValue = video.textContent || video.innerText;
                video.style.display = txtValue.toLowerCase().includes(filter) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
